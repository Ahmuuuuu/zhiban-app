server {
    listen 80;

    # 静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 所有 API 请求转发到后端
    location ~ ^/(ai_chat|ai_portrait|path|learning_path|resource|image|knowledge|user|admin|exam|video|study|presentation|notification|annotation|debug|static) {
        proxy_pass http://backend:2221;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 流式支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }
}
