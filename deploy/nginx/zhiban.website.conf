server {
    listen 80;
    server_name zhiban.website;

    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/zhiban-app/frontend;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/zhiban.website.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/extension/zhiban.website/*.conf;

    #SSL相关配置（启用时取消注释）
    #error_page 404 /404.html;

    # 错误页配置
    error_page 404 /404.html;

    # PHP引用配置（如不需要可注释）
    include enable-php-00.conf;

    # URL重写规则
    include /www/server/panel/vhost/rewrite/zhiban.website.conf;

    # ============================================================
    #  后端 API 反向代理 → localhost:2221
    #  覆盖所有后端路由：/ai_chat, /resource, /user, /static 等
    # ============================================================
    location ~ ^/(ai_chat|ai_portrait|resource|user|image|knowledge_base|admin|exam|path|learning_path|video|study|presentation|notification|annotation|static|docs|health) {
        proxy_pass http://127.0.0.1:2221;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ★ SSE 流式响应（Chat 对话 + PPT/文档生成 必需）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;   # LLM 生成可能很慢，给足够时间
        proxy_send_timeout 600s;

        # WebSocket 升级（如果未来需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 大文件上传
        client_max_body_size 100M;

        # 跳过此 location 的访问日志（可选，减少日志量）
        # access_log /dev/null;
    }

    # 静态资源缓存
    location ~* \.(gif|jpg|jpeg|png|bmp|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        error_log /dev/null;
    }

    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        error_log /dev/null;
    }

    # ============================================================
    #  前端 SPA 路由兜底（Vue Router history 模式）
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================================
    #  安全防护
    # ============================================================

    # 禁止访问敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$ {
        return 404;
    }

    # 禁止访问敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    # SSL证书验证目录
    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    # 日志
    access_log /www/wwwlogs/zhiban.website.log;
    error_log /www/wwwlogs/zhiban.website.error.log;
}
